services:
  - type: web
    name: ashoid
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /opt/render/project/data
    disk:
      name: ashoid-data
      mountPath: /opt/render/project/data
      sizeGB: 1
